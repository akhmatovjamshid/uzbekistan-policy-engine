<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Policy-UI — Product Spec</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --accent: #047857;
        --accent-bg: #ecfdf5;
        --code-bg: #f1f5f9;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      .topbar {
        position: sticky; top: 0; z-index: 10;
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 28px; background: var(--surface); border-bottom: 1px solid var(--border);
      }
      .topbar .crumbs { font-size: 13px; color: var(--muted); }
      .topbar .crumbs a { color: var(--muted); text-decoration: none; }
      .topbar .crumbs a:hover { color: var(--text); }
      .topbar .cta {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 8px 14px; background: var(--accent); color: #fff;
        border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600;
      }
      .topbar .cta:hover { background: #065f46; }
      main { max-width: 780px; margin: 0 auto; padding: 48px 28px 96px; }
      .meta {
        display: inline-block; padding: 4px 10px; background: var(--accent-bg);
        color: var(--accent); border-radius: 999px; font-size: 11px; font-weight: 600;
        letter-spacing: .4px; text-transform: uppercase; margin-bottom: 20px;
      }
      article { background: var(--surface); padding: 48px 56px; border: 1px solid var(--border); border-radius: 12px; }
      article h1 { font-size: 30px; line-height: 1.2; margin: 0 0 12px; font-weight: 700; letter-spacing: -0.01em; }
      article h2 { font-size: 22px; margin: 40px 0 12px; font-weight: 700; letter-spacing: -0.01em; border-top: 1px solid var(--border); padding-top: 32px; }
      article h2:first-of-type { border-top: none; padding-top: 0; }
      article h3 { font-size: 17px; margin: 28px 0 8px; font-weight: 600; color: var(--text); }
      article p { line-height: 1.65; margin: 0 0 14px; color: #1e293b; }
      article ul, article ol { line-height: 1.65; margin: 0 0 16px; padding-left: 22px; color: #1e293b; }
      article li { margin-bottom: 6px; }
      article code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.9em; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; }
      article pre { background: var(--code-bg); padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 13px; }
      article pre code { background: transparent; padding: 0; }
      article a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
      article blockquote { margin: 16px 0; padding: 12px 18px; border-left: 3px solid var(--accent); background: var(--accent-bg); color: var(--muted); }
      article table { border-collapse: collapse; margin: 16px 0; width: 100%; font-size: 14px; }
      article th, article td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
      article th { background: var(--code-bg); font-weight: 600; }
      .loading { text-align: center; color: var(--muted); padding: 40px; }
      .error { color: #b91c1c; background: #fef2f2; padding: 16px; border-radius: 8px; border: 1px solid #fecaca; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="crumbs">
        <a href="./">Policy Engine Hub</a>  /  Frontend Replatform Spec
      </div>
      <a class="cta" href="./policy-ui/">Open live preview →</a>
    </div>
    <main>
      <span class="meta">Internal review · Epic: frontend-replatform</span>
      <article id="content">
        <div class="loading">Loading spec…</div>
      </article>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script>
      const target = document.getElementById('content');
      fetch('uzbekistan_policy_engine_frontend_reimagining_spec.md', { cache: 'no-cache' })
        .then((r) => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then((md) => {
          target.innerHTML = marked.parse(md);
        })
        .catch((err) => {
          target.innerHTML = '<div class="error">Could not load spec: ' + err.message + '</div>';
        });
    </script>
  </body>
</html>
